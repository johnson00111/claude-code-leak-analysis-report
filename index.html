<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Source Code Leak — Technical Breakdown</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f1923;color:#f0ede6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
  
  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#1a2736;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
  .logo{font-size:15px;font-weight:600;color:#f0997b}
  .logo span{color:#5dcaa5;font-weight:400;margin-left:8px;font-size:13px}
  .controls{display:flex;align-items:center;gap:12px}
  
  /* Language toggle */
  .lang-toggle{display:flex;background:#0f1923;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}
  .lang-btn{padding:6px 14px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#8a9bb0;transition:all 0.2s}
  .lang-btn.active{background:#f0997b;color:#0f1923;font-weight:600}
  .lang-btn:hover:not(.active){background:rgba(240,153,123,0.15)}
  
  /* Download button */
  .dl-btn{padding:6px 14px;font-size:12px;cursor:pointer;border:1px solid rgba(93,202,165,0.4);background:transparent;color:#5dcaa5;border-radius:6px;text-decoration:none;transition:all 0.2s}
  .dl-btn:hover{background:rgba(93,202,165,0.15)}
  
  /* Slide area */
  .slide-container{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:16px;min-height:0}
  .slide-img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:opacity 0.25s ease}
  .slide-img.loading{opacity:0.3}
  
  /* Navigation arrows */
  .nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(26,39,54,0.85);border:1px solid rgba(255,255,255,0.1);color:#b4c0cf;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;backdrop-filter:blur(8px);z-index:10}
  .nav-arrow:hover{background:rgba(240,153,123,0.2);color:#f0997b;border-color:rgba(240,153,123,0.3)}
  .nav-arrow:active{transform:translateY(-50%) scale(0.95)}
  .nav-arrow.disabled{opacity:0.2;pointer-events:none}
  .nav-prev{left:16px}
  .nav-next{right:16px}
  
  /* Footer / progress */
  footer{display:flex;align-items:center;justify-content:center;padding:12px 24px;background:#1a2736;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;gap:16px}
  .slide-counter{font-size:13px;color:#8a9bb0;font-variant-numeric:tabular-nums;min-width:70px;text-align:center}
  .progress-bar{flex:1;max-width:400px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:#f0997b;border-radius:2px;transition:width 0.3s ease}
  
  /* Slide thumbnails */
  .thumb-strip{display:flex;gap:4px;overflow-x:auto;max-width:600px;scrollbar-width:none;-ms-overflow-style:none}
  .thumb-strip::-webkit-scrollbar{display:none}
  .thumb{width:48px;height:27px;object-fit:cover;border-radius:2px;cursor:pointer;opacity:0.4;transition:all 0.2s;border:1.5px solid transparent;flex-shrink:0}
  .thumb:hover{opacity:0.7}
  .thumb.active{opacity:1;border-color:#f0997b}
  
  /* Keyboard hint */
  .key-hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:11px;color:#4a5568;pointer-events:none}
  .key-hint kbd{padding:1px 6px;background:#1a2736;border:1px solid #2a3a4a;border-radius:3px;font-family:inherit;font-size:10px}
  
  /* Mobile */
  @media(max-width:768px){
    .nav-arrow{width:36px;height:36px;font-size:16px}
    .nav-prev{left:4px}
    .nav-next{right:4px}
    .thumb-strip{max-width:200px}
    .key-hint{display:none}
    header{padding:8px 12px}
    .logo span{display:none}
    footer{padding:8px 12px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Claude Code Leak<span>Analysis Report</span></div>
  <div class="controls">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <a class="dl-btn" id="dl-link" href="pptx/claude-code-leak-zh.pptx" download>↓ PPTX</a>
  </div>
</header>

<div class="slide-container" id="slideContainer">
  <button class="nav-arrow nav-prev" onclick="nav(-1)">‹</button>
  <img class="slide-img" id="slideImg" src="" alt="Slide">
  <button class="nav-arrow nav-next" onclick="nav(1)">›</button>
</div>

<footer>
  <div class="slide-counter" id="counter">1 / 31</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="thumb-strip" id="thumbs"></div>
</footer>

<div class="key-hint"><kbd>←</kbd> <kbd>→</kbd> navigate &nbsp; <kbd>F</kbd> fullscreen</div>

<script>
const TOTAL = 31;
let current = 1;
let lang = 'zh';

function pad(n) { return String(n).padStart(2, '0'); }
function slidePath(n) { return `slides/${lang}/slide-${pad(n)}.jpg`; }

function render() {
  const img = document.getElementById('slideImg');
  img.classList.add('loading');
  img.src = slidePath(current);
  img.onload = () => img.classList.remove('loading');
  
  document.getElementById('counter').textContent = `${current} / ${TOTAL}`;
  document.getElementById('progress').style.width = `${(current / TOTAL) * 100}%`;
  
  document.querySelector('.nav-prev').classList.toggle('disabled', current === 1);
  document.querySelector('.nav-next').classList.toggle('disabled', current === TOTAL);
  
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i + 1 === current);
    if (i + 1 === current) t.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  });
}

function nav(dir) {
  const next = current + dir;
  if (next >= 1 && next <= TOTAL) { current = next; render(); }
}

function goTo(n) { current = n; render(); }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === (l === 'zh' ? '中文' : 'EN')));
  document.getElementById('dl-link').href = `pptx/claude-code-leak-${l}.pptx`;
  // Rebuild thumbnails
  buildThumbs();
  render();
}

function buildThumbs() {
  const strip = document.getElementById('thumbs');
  strip.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const img = document.createElement('img');
    img.className = 'thumb' + (i === current ? ' active' : '');
    img.src = slidePath(i);
    img.onclick = () => goTo(i);
    img.alt = `Slide ${i}`;
    strip.appendChild(img);
  }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') nav(-1);
  else if (e.key === 'ArrowRight') nav(1);
  else if (e.key === 'Home') goTo(1);
  else if (e.key === 'End') goTo(TOTAL);
  else if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// Touch swipe
let touchStartX = 0;
document.getElementById('slideContainer').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('slideContainer').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) nav(diff > 0 ? 1 : -1);
});

// Click on slide to advance
document.getElementById('slideImg').addEventListener('click', e => {
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  nav(x > rect.width / 2 ? 1 : -1);
});

// Preload adjacent slides
function preload() {
  [current - 1, current + 1, current + 2].forEach(n => {
    if (n >= 1 && n <= TOTAL) { const img = new Image(); img.src = slidePath(n); }
  });
}
const origRender = render;
render = function() { origRender(); preload(); };

// Init
buildThumbs();
render();
</script>
</body>
</html>
